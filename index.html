<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一抹金蓝 · 自动审片系统</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: {
                        50: '#eff6ff',
                        100: '#dbeafe',
                        200: '#bfdbfe',
                        300: '#93c5fd',
                        400: '#60a5fa',
                        500: '#3b82f6',
                        600: '#2563eb',
                        700: '#1d4ed8',
                        800: '#1e40af',
                        900: '#1e3a8a',
                    },
                    gold: {
                        50: '#fffbeb',
                        100: '#fef3c7',
                        200: '#fde68a',
                        300: '#fcd34d',
                        400: '#fbbf24',
                        500: '#f59e0b',
                        600: '#d97706',
                    }
                },
                animation: {
                    'fade-in': 'fadeIn 0.3s ease-out',
                    'slide-up': 'slideUp 0.3s ease-out',
                    'slide-down': 'slideDown 0.3s ease-out',
                    'scale-in': 'scaleIn 0.2s ease-out',
                    'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
                },
                keyframes: {
                    fadeIn: {
                        '0%': { opacity: '0' },
                        '100%': { opacity: '1' },
                    },
                    slideUp: {
                        '0%': { opacity: '0', transform: 'translateY(20px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    slideDown: {
                        '0%': { opacity: '0', transform: 'translateY(-20px)' },
                        '100%': { opacity: '1', transform: 'translateY(0)' },
                    },
                    scaleIn: {
                        '0%': { opacity: '0', transform: 'scale(0.95)' },
                        '100%': { opacity: '1', transform: 'scale(1)' },
                    },
                    pulseSoft: {
                        '0%, 100%': { opacity: '1' },
                        '50%': { opacity: '0.6' },
                    }
                },
                boxShadow: {
                    'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
                    'soft-lg': '0 10px 40px -10px rgba(0, 0, 0, 0.1), 0 2px 10px -2px rgba(0, 0, 0, 0.04)',
                    'glow-blue': '0 0 20px rgba(37, 99, 235, 0.25)',
                    'glow-gold': '0 0 20px rgba(245, 158, 11, 0.25)',
                },
            }
        }
    }
    </script>
    <style>
        @layer utilities {
            .transition-smooth { @apply transition-all duration-300 ease-out; }
            .transition-fast { @apply transition-all duration-150 ease-out; }
            .glass { @apply bg-white/80 backdrop-blur-md border border-white/20; }
            .gradient-brand { @apply bg-gradient-to-r from-blue-600 to-blue-500; }
            .gradient-warm { @apply bg-gradient-to-r from-amber-500 to-yellow-400; }
            .gradient-subtle { @apply bg-gradient-to-br from-gray-50 to-blue-50/30; }
            .hover-lift { @apply transition-smooth hover:-translate-y-0.5 hover:shadow-soft-lg; }
            .hover-glow { @apply transition-smooth hover:shadow-glow-blue; }
            .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
            .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        }
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* Progress bar animation */
        .progress-bar { transition: width 0.8s ease; }
    </style>
    <!-- AiPexBase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/aipexbase-js/dist/aipexbase.umd.min.js"></script>
</head>
<body class="gradient-subtle min-h-screen">

    <!-- ===== Toast Container ===== -->
    <div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-3"></div>

    <!-- ===== Progress Overlay ===== -->
    <div id="global-loading" class="fixed inset-0 z-[90] bg-white/60 backdrop-blur-sm hidden items-center justify-center">
        <div class="flex flex-col items-center space-y-4">
            <div class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="text-gray-600 text-sm font-medium" id="loading-text">加载中...</p>
        </div>
    </div>

    <!-- ===== Navigation ===== -->
    <nav class="sticky top-0 z-50 glass border-b border-gray-200/50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Logo + Brand -->
                <div class="flex items-center space-x-3 cursor-pointer" onclick="navigate('/')">
                    <div class="w-9 h-9 rounded-lg gradient-brand flex items-center justify-center shadow-soft relative overflow-hidden">
                        <span class="text-white font-bold text-lg">金</span>
                        <div class="absolute inset-0 bg-gradient-to-br from-yellow-300/30 to-transparent"></div>
                    </div>
                    <div>
                        <span class="text-lg font-bold bg-gradient-to-r from-blue-700 to-blue-500 bg-clip-text text-transparent">一抹金蓝</span>
                        <span class="ml-2 text-sm text-gray-400 font-medium hidden sm:inline">自动审片</span>
                    </div>
                </div>
                <!-- Nav Actions -->
                <div class="flex items-center space-x-3">
                    <button onclick="navigate('/new')" class="gradient-brand text-white px-4 py-2 rounded-xl text-sm font-medium hover-lift hover-glow flex items-center space-x-1.5 shadow-soft">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        <span>新建审片</span>
                    </button>
                    <button onclick="location.reload()" class="p-2 rounded-lg text-gray-400 hover:text-blue-600 hover:bg-blue-50 transition-smooth" title="刷新">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- ===== Main Content ===== -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="app-content">
        <!-- Router renders here -->
    </main>

    <script>
        // ============================================================
        //  Configuration
        // ============================================================
        const CONFIG = {
            baseUrl: 'https://baas.kuafuai.net/baas-api',
            apiKey: 'baas_48hsLNAW'
        };

        // ============================================================
        //  Client Init
        // ============================================================
        const client = aipexbase.createClient(CONFIG);

        // ============================================================
        //  Toast
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = {
                success: 'bg-green-50 border-green-200 text-green-800',
                error: 'bg-red-50 border-red-200 text-red-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800',
                info: 'bg-blue-50 border-blue-200 text-blue-800'
            };
            const icons = {
                success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>',
                error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>',
                warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>',
                info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
            };
            toast.className = `flex items-center px-4 py-3 rounded-xl border shadow-soft-lg animate-slide-down ${styles[type]}`;
            toast.innerHTML = `
                <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type]}</svg>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ============================================================
        //  Loading
        // ============================================================
        function showLoading(text = '加载中...') {
            document.getElementById('loading-text').textContent = text;
            document.getElementById('global-loading').classList.remove('hidden');
            document.getElementById('global-loading').classList.add('flex');
        }
        function hideLoading() {
            document.getElementById('global-loading').classList.add('hidden');
            document.getElementById('global-loading').classList.remove('flex');
        }

        // ============================================================
        //  File Upload Helper
        // ============================================================
        async function uploadFile(file, onProgress) {
            const formData = new FormData();
            formData.append('file', file);
            const token = localStorage.getItem('baas_token') || '';
            const response = await fetch(`${CONFIG.baseUrl}/common/upload`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'CODE_FLYING': CONFIG.apiKey
                },
                body: formData
            });
            const result = await response.json();
            if (result.success && result.data) {
                return result.data.url;
            }
            throw new Error(result.message || '上传失败');
        }

        // ============================================================
        //  Status Badge
        // ============================================================
        function statusBadge(status) {
            const map = {
                'pending': { label: '待审核', cls: 'bg-gray-100 text-gray-600 border-gray-200' },
                'reviewing': { label: '审核中', cls: 'bg-blue-50 text-blue-600 border-blue-200 animate-pulse-soft' },
                'ai_done': { label: 'AI完成', cls: 'bg-amber-50 text-amber-600 border-amber-200' },
                'completed': { label: '已完成', cls: 'bg-green-50 text-green-700 border-green-200' },
            };
            const s = map[status] || { label: status, cls: 'bg-gray-100 text-gray-500' };
            return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${s.cls}">${s.label}</span>`;
        }

        function sceneStatusBadge(status) {
            const map = {
                'pass': { label: '通过', cls: 'bg-green-100 text-green-700 border-green-200' },
                'warning': { label: '警告', cls: 'bg-amber-100 text-amber-700 border-amber-200' },
                'fail': { label: '不通过', cls: 'bg-red-100 text-red-700 border-red-200' },
            };
            const s = map[status] || { label: status, cls: 'bg-gray-100 text-gray-500' };
            return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${s.cls}">${s.label}</span>`;
        }

        // ============================================================
        //  Score Ring
        // ============================================================
        function scoreRing(score, size = 48) {
            const r = (size / 2) - 4;
            const circumference = 2 * Math.PI * r;
            const offset = circumference - ((score || 0) / 100) * circumference;
            const color = score >= 80 ? '#22c55e' : score >= 60 ? '#f59e0b' : '#ef4444';
            return `
                <svg width="${size}" height="${size}" class="transform -rotate-90 flex-shrink-0">
                    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="3"/>
                    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
                        stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                        stroke-linecap="round" class="transition-all duration-1000"/>
                </svg>
                <span class="absolute inset-0 flex items-center justify-center text-xs font-bold" style="color:${color}">${score || '-'}</span>
            `;
        }

        // ============================================================
        //  Router
        // ============================================================
        function navigate(path) {
            window.location.hash = path;
            render();
        }

        function getRoute() {
            const hash = window.location.hash.slice(1) || '/';
            const parts = hash.split('/').filter(Boolean);
            return { route: '/' + (parts[0] || ''), params: parts };
        }

        // ============================================================
        //  Render Engine
        // ============================================================
        async function render() {
            const { route, params } = getRoute();
            const container = document.getElementById('app-content');
            try {
                if (route === '/') {
                    await renderProjectList(container);
                } else if (route === '/new') {
                    renderNewProject(container);
                } else if (route === '/project' && params[1]) {
                    await renderProjectDetail(container, params[1]);
                } else {
                    await renderProjectList(container);
                }
            } catch (err) {
                console.error('Render error:', err);
                container.innerHTML = `
                    <div class="text-center py-20">
                        <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-50 flex items-center justify-center">
                            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01"/><circle cx="12" cy="12" r="10"/></svg>
                        </div>
                        <h3 class="text-lg font-medium text-gray-900 mb-2">页面加载出错</h3>
                        <p class="text-gray-500 mb-4">${err.message}</p>
                        <button onclick="navigate('/')" class="gradient-brand text-white px-4 py-2 rounded-lg text-sm">返回首页</button>
                    </div>
                `;
            }
        }

        // ============================================================
        //  Page: Project List
        // ============================================================
        async function renderProjectList(container) {
            showLoading('加载审片列表...');
            const res = await client.db.from('projects').list().order('created_at', 'desc');
            hideLoading();
            const projects = res.success ? (res.data || []) : [];
            container.innerHTML = `
                <!-- Hero -->
                <div class="mb-8 animate-fade-in">
                    <div class="flex items-center justify-between">
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-bold bg-gradient-to-r from-gray-900 via-gray-800 to-gray-600 bg-clip-text text-transparent">
                                审片项目
                            </h1>
                            <p class="mt-1.5 text-gray-500 text-sm">共 ${projects.length} 个项目</p>
                        </div>
                        <button onclick="navigate('/new')" class="gradient-brand text-white px-5 py-2.5 rounded-xl text-sm font-medium hover-lift hover-glow flex items-center space-x-1.5 shadow-soft whitespace-nowrap">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            <span>新建审片</span>
                        </button>
                    </div>
                </div>
                <!-- Stats -->
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8 animate-slide-up">
                    <div class="bg-white rounded-2xl shadow-soft p-4 border border-gray-100">
                        <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">总计</p>
                        <p class="text-2xl font-bold text-gray-900">${projects.length}</p>
                    </div>
                    <div class="bg-white rounded-2xl shadow-soft p-4 border border-gray-100">
                        <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">待审核</p>
                        <p class="text-2xl font-bold text-gray-600">${projects.filter(p => p.status === 'pending').length}</p>
                    </div>
                    <div class="bg-white rounded-2xl shadow-soft p-4 border border-gray-100">
                        <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">AI完成</p>
                        <p class="text-2xl font-bold text-amber-500">${projects.filter(p => p.status === 'ai_done').length}</p>
                    </div>
                    <div class="bg-white rounded-2xl shadow-soft p-4 border border-gray-100">
                        <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">已完成</p>
                        <p class="text-2xl font-bold text-green-500">${projects.filter(p => p.status === 'completed').length}</p>
                    </div>
                </div>
                <!-- Project List -->
                ${projects.length === 0 ? `
                <div class="bg-white rounded-2xl shadow-soft p-12 text-center animate-fade-in">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-blue-50 flex items-center justify-center">
                        <svg class="w-10 h-10 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                    </div>
                    <h3 class="text-lg font-medium text-gray-700 mb-2">还没有审片项目</h3>
                    <p class="text-gray-400 mb-6">上传剧本和成片，让 AI 帮你自动审核</p>
                    <button onclick="navigate('/new')" class="gradient-brand text-white px-6 py-2.5 rounded-xl text-sm font-medium hover-lift">创建第一个项目</button>
                </div>
                ` : `
                <div class="space-y-4 animate-fade-in">
                    ${projects.map(p => {
                        const projectName = p.project_name || '未命名项目';
                        const score = p.overall_score != null ? p.overall_score : '-';
                        const totalScenes = p.total_scenes || 0;
                        const passCount = p.pass_count || 0;
                        const warnCount = p.warning_count || 0;
                        const failCount = p.fail_count || 0;
                        const created = p.created_at ? new Date(p.created_at).toLocaleString('zh-CN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                        return `
                        <div class="bg-white rounded-2xl shadow-soft p-5 border border-gray-100 hover-lift cursor-pointer" onclick="navigate('/project/${p.id}')">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center space-x-3 min-w-0">
                                    <h3 class="text-base font-semibold text-gray-900 truncate">${projectName}</h3>
                                    ${statusBadge(p.status)}
                                </div>
                                <svg class="w-4 h-4 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                            </div>
                            <div class="flex items-center space-x-6 text-sm text-gray-500">
                                ${score !== '-' ? `
                                <div class="flex items-center space-x-1">
                                    <span class="font-semibold ${score >= 80 ? 'text-green-500' : score >= 60 ? 'text-amber-500' : 'text-red-500'}">${score}</span>
                                    <span>分</span>
                                </div>
                                ` : ''}
                                ${totalScenes > 0 ? `
                                <span>${totalScenes} 场</span>
                                <span class="text-green-500">${passCount}通过</span>
                                ${warnCount > 0 ? `<span class="text-amber-500">${warnCount}警告</span>` : ''}
                                ${failCount > 0 ? `<span class="text-red-500">${failCount}不通过</span>` : ''}
                                ` : ''}
                                ${created ? `<span class="ml-auto text-gray-400">${created}</span>` : ''}
                            </div>
                        </div>`;
                    }).join('')}
                </div>`}
            `;
        }

        // ============================================================
        //  Page: New Project
        // ============================================================
        function renderNewProject(container) {
            const scenesInput = `
                <div class="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 animate-fade-in">
                    <h2 class="text-lg font-semibold text-gray-900 mb-1">新建审片项目</h2>
                    <p class="text-sm text-gray-400 mb-6">上传剧本文件与成片视频，提交后AI将自动进行审核分析</p>
                    <form id="new-project-form" class="space-y-5">
                        <!-- Project Name -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                项目名称 <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="project-name" required
                                class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition-smooth text-sm"
                                placeholder="例如：第3集 都市篇">
                        </div>
                        <!-- Script Upload -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                剧本文件 <span class="text-gray-400 text-xs">（.docx / .txt / .pdf）</span>
                            </label>
                            <div class="relative">
                                <input type="file" id="script-file" accept=".docx,.doc,.txt,.pdf,.md"
                                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 file:cursor-pointer cursor-pointer transition-smooth">
                            </div>
                        </div>
                        <!-- Video Upload -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1.5">
                                成片视频 <span class="text-gray-400 text-xs">（.mp4 / .mov）</span>
                            </label>
                            <div class="relative">
                                <input type="file" id="video-file" accept=".mp4,.mov,.avi,.webm"
                                    class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 file:cursor-pointer cursor-pointer transition-smooth">
                            </div>
                        </div>
                        <!-- Submit -->
                        <div class="flex items-center space-x-3 pt-2">
                            <button type="submit"
                                class="gradient-brand text-white px-6 py-2.5 rounded-xl text-sm font-medium hover-lift hover-glow flex items-center space-x-1.5 shadow-soft disabled:opacity-50 disabled:cursor-not-allowed"
                                id="submit-btn">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                                <span>提交审片</span>
                            </button>
                            <button type="button" onclick="navigate('/')"
                                class="px-4 py-2.5 rounded-xl text-sm font-medium text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-smooth">
                                取消
                            </button>
                            <div id="upload-progress" class="hidden flex items-center space-x-2 text-sm text-gray-400">
                                <div class="w-4 h-4 border-2 border-blue-200 border-t-blue-500 rounded-full animate-spin"></div>
                                <span id="progress-text">上传中...</span>
                            </div>
                        </div>
                    </form>
                </div>`;
            container.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    ${scenesInput}
                </div>`;
            // Form submit handler
            document.getElementById('new-project-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                const progress = document.getElementById('upload-progress');
                const progressText = document.getElementById('progress-text');
                btn.disabled = true;
                progress.classList.remove('hidden');
                try {
                    const name = document.getElementById('project-name').value.trim();
                    if (!name) { showToast('请输入项目名称', 'warning'); btn.disabled = false; progress.classList.add('hidden'); return; }
                    let scriptUrl = null, videoUrl = null;
                    const scriptFile = document.getElementById('script-file').files[0];
                    const videoFile = document.getElementById('video-file').files[0];
                    if (scriptFile) {
                        progressText.textContent = '上传剧本文件...';
                        scriptUrl = await uploadFile(scriptFile);
                    }
                    if (videoFile) {
                        progressText.textContent = '上传成片视频...';
                        videoUrl = await uploadFile(videoFile);
                    }
                    if (!scriptUrl && !videoUrl) {
                        showToast('请至少上传剧本或成片视频', 'warning');
                        btn.disabled = false; progress.classList.add('hidden'); return;
                    }
                    progressText.textContent = '创建审片项目...';
                    const insertData = {
                        project_name: name,
                        status: 'pending',
                        created_at: new Date().toISOString().slice(0,19).replace('T', ' ')
                    };
                    if (scriptUrl) insertData.script_file = [scriptUrl];
                    if (videoUrl) insertData.video_file = [videoUrl];
                    const res = await client.db.from('projects').insert().values(insertData);
                    if (res.success) {
                        showToast('审片项目创建成功！AI正在分析中...', 'success');
                        navigate('/');
                    } else {
                        throw new Error(res.message || '创建失败');
                    }
                } catch (err) {
                    showToast(err.message || '操作失败', 'error');
                    btn.disabled = false;
                    progress.classList.add('hidden');
                }
            });
        }

        // ============================================================
        //  Page: Project Detail
        // ============================================================
        async function renderProjectDetail(container, projectId) {
            showLoading('加载审片详情...');
            const res = await client.db.from('projects').get().eq('id', parseInt(projectId));
            hideLoading();
            if (!res.success || !res.data) {
                container.innerHTML = `<div class="text-center py-20 text-gray-500">项目不存在</div>`;
                return;
            }
            const project = res.data;
            // Load scenes
            const scenesRes = await client.db.from('scenes').list()
                .eq('project_id', project.id)
                .order('scene_index', 'asc');
            const scenes = scenesRes.success ? (scenesRes.data || []) : [];
            const report = project.summary_report ? safeJsonParse(project.summary_report, {}) : {};

            container.innerHTML = `
            <!-- Back -->
            <div class="mb-6 animate-fade-in">
                <button onclick="navigate('/')" class="inline-flex items-center text-sm text-gray-400 hover:text-blue-600 transition-smooth">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    返回列表
                </button>
            </div>
            <!-- Project Header -->
            <div class="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 animate-slide-up mb-6">
                <div class="flex items-start justify-between flex-wrap gap-4">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center space-x-3 mb-2">
                            <h1 class="text-xl sm:text-2xl font-bold text-gray-900">${project.project_name || '未命名项目'}</h1>
                            ${statusBadge(project.status)}
                        </div>
                        <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500">
                            ${project.created_at ? `<span>创建于 ${new Date(project.created_at).toLocaleString('zh-CN')}</span>` : ''}
                            ${project.total_scenes ? `<span>共 ${project.total_scenes} 场</span>` : ''}
                            ${project.pass_count != null ? `<span class="text-green-500">✓ ${project.pass_count} 通过</span>` : ''}
                            ${project.warning_count ? `<span class="text-amber-500">⚠ ${project.warning_count} 警告</span>` : ''}
                            ${project.fail_count ? `<span class="text-red-500">✗ ${project.fail_count} 不通过</span>` : ''}
                        </div>
                    </div>
                    ${project.overall_score != null ? `
                    <div class="flex items-center space-x-3">
                        <div class="text-right">
                            <p class="text-xs text-gray-400">综合评分</p>
                            <p class="text-2xl font-bold ${project.overall_score >= 80 ? 'text-green-500' : project.overall_score >= 60 ? 'text-amber-500' : 'text-red-500'}">${project.overall_score}</p>
                        </div>
                    </div>
                    ` : ''}
                </div>
                <!-- Action Buttons -->
                <div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap gap-2">
                    ${project.status === 'pending' ? `
                    <button onclick="startReview(${project.id})" class="gradient-warm text-white px-4 py-2 rounded-xl text-sm font-medium hover-lift shadow-soft flex items-center space-x-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span>启动AI审片</span>
                    </button>
                    ` : ''}
                    ${project.status === 'ai_done' ? `
                    <button onclick="completeReview(${project.id})" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover-lift shadow-soft flex items-center space-x-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        <span>标记已完成</span>
                    </button>
                    ` : ''}
                    <button onclick="deleteProject(${project.id})" class="px-4 py-2 rounded-xl text-sm font-medium text-red-400 hover:text-red-600 hover:bg-red-50 transition-smooth flex items-center space-x-1.5">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        <span>删除</span>
                    </button>
                </div>
            </div>
            <!-- Summary Report -->
            ${report.overall || report.mainIssues || report.highlights ? `
            <div class="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 mb-6 animate-slide-up">
                <h2 class="text-base font-semibold text-gray-900 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    AI审片报告
                </h2>
                ${report.overall ? `
                <div class="mb-4">
                    <p class="text-sm font-medium text-gray-600 mb-1">总体评价</p>
                    <p class="text-sm text-gray-700 bg-gray-50 rounded-xl p-3">${report.overall}</p>
                </div>` : ''}
                ${report.mainIssues && report.mainIssues.length ? `
                <div class="mb-4">
                    <p class="text-sm font-medium text-gray-600 mb-2">主要问题</p>
                    <ul class="space-y-1.5">
                        ${report.mainIssues.map(i => `<li class="flex items-start space-x-2 text-sm text-gray-600">
                            <span class="text-red-400 mt-0.5 flex-shrink-0">•</span>
                            <span>${i}</span>
                        </li>`).join('')}
                    </ul>
                </div>` : ''}
                ${report.highlights && report.highlights.length ? `
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-2">亮点</p>
                    <ul class="space-y-1.5">
                        ${report.highlights.map(i => `<li class="flex items-start space-x-2 text-sm text-gray-600">
                            <span class="text-green-400 mt-0.5 flex-shrink-0">•</span>
                            <span>${i}</span>
                        </li>`).join('')}
                    </ul>
                </div>` : ''}
            </div>` : ''}
            <!-- Scene List -->
            <div class="mb-6 animate-fade-in">
                <h2 class="text-base font-semibold text-gray-900 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                    场景逐帧审核 ${scenes.length ? `（${scenes.length} 场）` : ''}
                </h2>
                ${scenes.length === 0 ? `
                <div class="bg-white rounded-2xl shadow-soft p-8 text-center border border-gray-100">
                    <p class="text-gray-400">${project.status === 'pending' ? '尚未启动审核，点击上方 "启动AI审片" 开始分析' : '暂无场景数据'}</p>
                </div>` : `
                <div class="space-y-4">
                    ${scenes.map((s, idx) => `
                    <div class="bg-white rounded-2xl shadow-soft p-5 border border-gray-100 hover-lift">
                        <div class="flex items-start justify-between mb-3">
                            <div class="flex items-center space-x-3">
                                <span class="w-7 h-7 rounded-lg bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-500">${s.scene_index}</span>
                                <h3 class="text-sm font-semibold text-gray-900">场景 ${s.scene_index}</h3>
                                ${sceneStatusBadge(s.status)}
                            </div>
                            ${s.consistency_score != null ? `
                            <div class="relative flex-shrink-0">${scoreRing(s.consistency_score, 40)}</div>
                            ` : ''}
                        </div>
                        ${s.script_text ? `<p class="text-xs text-gray-500 mb-2 line-clamp-2">剧本：${s.script_text}</p>` : ''}
                        <!-- Audio Sync Badge -->
                        ${s.audio_sync_score != null ? `
                        <div class="flex items-center space-x-2 mb-2">
                            <span class="text-xs text-gray-400">音画同步：</span>
                            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium ${s.audio_sync_score >= 80 ? 'bg-green-50 text-green-600' : s.audio_sync_score >= 60 ? 'bg-amber-50 text-amber-600' : 'bg-red-50 text-red-600'}">${s.audio_sync_score}分</span>
                            ${s.audio_sync_issues ? `<span class="text-xs text-red-400 truncate max-w-[200px]">${s.audio_sync_issues}</span>` : ''}
                        </div>` : ''}
                        <!-- Subtitle Badges -->
                        <div class="flex flex-wrap items-center gap-2 mb-2">
                            ${s.subtitle_typo_count != null && s.subtitle_typo_count > 0 ? `
                            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-red-50 text-red-600">
                                错别字 ${s.subtitle_typo_count}处
                            </span>` : s.subtitle_typo_count === 0 ? `
                            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-green-50 text-green-600">
                                字幕无错别字
                            </span>` : ''}
                            ${s.subtitle_consistency_score != null ? `
                            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium ${s.subtitle_consistency_score >= 80 ? 'bg-green-50 text-green-600' : s.subtitle_consistency_score >= 60 ? 'bg-amber-50 text-amber-600' : 'bg-red-50 text-red-600'}">
                                字幕剧本一致 ${s.subtitle_consistency_score}分
                            </span>` : ''}
                        </div>
                        ${s.frame_url ? `
                        <div class="mb-2">
                            <img src="${s.frame_url}" alt="场景 ${s.scene_index} 关键帧"
                                class="w-full max-h-48 object-cover rounded-xl border border-gray-100 cursor-pointer"
                                onclick="window.open('${s.frame_url}', '_blank')">
                        </div>` : ''}
                        ${s.ai_comment ? `<p class="text-xs text-gray-400 bg-gray-50 rounded-lg p-2">💬 ${s.ai_comment}</p>` : ''}
                        ${s.quality_issues ? (() => {
                            const issues = safeJsonParse(s.quality_issues, []);
                            return issues.length ? `
                            <div class="mt-2 flex flex-wrap gap-1.5">
                                ${issues.map(i => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-red-50 text-red-600 border border-red-100">${i}</span>`).join('')}
                            </div>` : '';
                        })() : ''}
                        <div class="mt-3 pt-3 border-t border-gray-50 flex items-center justify-between">
                            <button onclick="openSceneDetail(${project.id}, ${s.id})" class="text-xs text-blue-500 hover:text-blue-700 font-medium">查看详情 →</button>
                            <span class="text-xs text-gray-300">${s.created_at ? new Date(s.created_at).toLocaleString('zh-CN', {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                        </div>
                    </div>`).join('')}
                </div>`}
            </div>
            `;
        }

        // ============================================================
        //  Actions
        // ============================================================
        function safeJsonParse(str, fallback) {
            try { return JSON.parse(str); } catch { return fallback; }
        }

        async function startReview(projectId) {
            if (!confirm('确认启动 AI 审片？系统将分析剧本与成片视频进行逐帧审核。')) return;
            showLoading('AI 审片启动中...');
            try {
                await client.db.from('projects').update()
                    .set({ status: 'reviewing', updated_at: new Date().toISOString().slice(0,19).replace('T', ' ') })
                    .eq('id', projectId);
                showToast('已启动审片，正在分析中', 'success');
                navigate(`/project/${projectId}`);
            } catch (err) {
                showToast(err.message || '操作失败', 'error');
                hideLoading();
            }
        }

        async function completeReview(projectId) {
            if (!confirm('确认标记为已完成？')) return;
            try {
                await client.db.from('projects').update()
                    .set({ status: 'completed', updated_at: new Date().toISOString().slice(0,19).replace('T', ' ') })
                    .eq('id', projectId);
                showToast('已标记为完成', 'success');
                navigate(`/project/${projectId}`);
            } catch (err) {
                showToast(err.message || '操作失败', 'error');
            }
        }

        async function deleteProject(projectId) {
            if (!confirm('确认删除该项目？此操作不可恢复。')) return;
            try {
                // Delete scenes first
                const scenes = await client.db.from('scenes').list().eq('project_id', projectId);
                if (scenes.success && scenes.data) {
                    for (const s of scenes.data) {
                        await client.db.from('scenes').delete().eq('id', s.id);
                    }
                }
                await client.db.from('projects').delete().eq('id', projectId);
                showToast('已删除', 'success');
                navigate('/');
            } catch (err) {
                showToast(err.message || '删除失败', 'error');
            }
        }

        function openSceneDetail(projectId, sceneId) {
            // For now, just scroll to the scene card. Future: full modal.
            const cards = document.querySelectorAll('.bg-white.rounded-2xl.shadow-soft');
            for (const card of cards) {
                if (card.textContent.includes(`场景 ${sceneId}`) || card.querySelector('[data-scene-id]')) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.style.boxShadow = '0 0 0 2px #3b82f6';
                    setTimeout(() => card.style.boxShadow = '', 2000);
                    return;
                }
            }
        }

        // ============================================================
        //  Page Detail: Re-render support
        // ============================================================
        // Make functions globally accessible for onclick handlers
        window.navigate = navigate;
        window.startReview = startReview;
        window.completeReview = completeReview;
        window.deleteProject = deleteProject;
        window.openSceneDetail = openSceneDetail;

        // ============================================================
        //  Init
        // ============================================================
        window.addEventListener('hashchange', render);
        window.addEventListener('DOMContentLoaded', render);
        // Also render immediately
        render();
    </script>
</body>
</html>
