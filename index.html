    <script>
        // ============================================================
        //  Configuration
        // ============================================================
        const CONFIG = {
            baseUrl: 'https://baas.kuafuai.net/baas-api',
            apiKey: 'baas_48hsLNAW'
        };

        // ============================================================
        //  Client Init
        // ============================================================
        const client = aipexbase.createClient(CONFIG);

        // ============================================================
        //  API Config (localStorage)
        // ============================================================
        function getApiConfig() {
            try {
                const raw = localStorage.getItem('review_tool_api_config');
                if (raw) return JSON.parse(raw);
            } catch(e) {}
            return {
                apiKey: '',
                baseUrl: 'https://api.openai.com/v1',
                model: 'gpt-4o'
            };
        }

        function saveApiConfigToStorage(cfg) {
            localStorage.setItem('review_tool_api_config', JSON.stringify(cfg));
        }

        function openApiConfig() {
            const cfg = getApiConfig();
            document.getElementById('api-key-input').value = cfg.apiKey || '';
            document.getElementById('api-base-url').value = cfg.baseUrl || 'https://api.openai.com/v1';
            document.getElementById('model-select').value = cfg.model || 'gpt-4o';
            document.getElementById('api-config-modal').classList.remove('hidden');
            document.getElementById('api-config-modal').classList.add('flex');
        }

        function closeApiConfig() {
            document.getElementById('api-config-modal').classList.add('hidden');
            document.getElementById('api-config-modal').classList.remove('flex');
        }

        function saveApiConfig() {
            const cfg = {
                apiKey: document.getElementById('api-key-input').value.trim(),
                baseUrl: document.getElementById('api-base-url').value.trim().replace(/\/+$/, ''),
                model: document.getElementById('model-select').value
            };
            if (!cfg.apiKey) {
                showToast('请输入 API Key', 'warning');
                return;
            }
            saveApiConfigToStorage(cfg);
            showToast('AI 配置已保存', 'success');
            closeApiConfig();
        }

        // ============================================================
        //  Text Extraction Helpers
        // ============================================================
        async function fetchTextFromUrl(url) {
            // Try via CORS proxy if OBS blocks direct fetch
            const doFetch = async (u) => {
                const resp = await fetch(u);
                const ct = (resp.headers.get('content-type') || '').toLowerCase();
                if (u.endsWith('.docx') || ct.includes('officedocument') || ct.includes('word')) {
                    if (typeof mammoth !== 'undefined') {
                        const arrayBuffer = await resp.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                        return result.value;
                    }
                }
                const text = await resp.text();
                if (text.length > 50 && !text.includes('ï¿½')) return text;
                return text;
            };
            try {
                return await doFetch(url);
            } catch(e) {
                // OBS CORS blocked — try via corsproxy.io
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                try {
                    const text = await doFetch(proxyUrl);
                    return text;
                } catch(e2) {
                    // Try allorigins as fallback
                    const proxy2 = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
                    return await doFetch(proxy2);
                }
            }
        }

        function splitIntoScenes(text) {
            // Try to split by common scene markers
            const sceneMarkers = [
                /场景\s*(\d+)/gi,
                /第\s*(\d+)\s*场/gi,
                /Scene\s*(\d+)/gi,
                /SCENE\s*(\d+)/gi,
                /\n\n\n+/g
            ];
            let scenes = [];
            // Try scene markers first
            for (const marker of sceneMarkers) {
                const parts = text.split(marker);
                if (parts.length > 3) {
                    scenes = parts.filter(p => p.trim().length > 10);
                    if (scenes.length >= 2) break;
                }
            }
            // Fallback: split by double newlines
            if (scenes.length < 2) {
                scenes = text.split(/\n\s*\n/).filter(s => s.trim().length > 10);
            }
            // If still too few, treat whole text as one scene
            if (scenes.length < 1) scenes = [text];
            // Limit to max 50 scenes
            if (scenes.length > 50) scenes = scenes.slice(0, 50);
            return scenes;
        }

        // ============================================================
        //  AI Chat Completion
        // ============================================================
        async function aiChat(systemPrompt, userMessage, config) {
            const body = {
                model: config.model,
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userMessage }
                ],
                temperature: 0.3,
                max_tokens: 4096
            };
            
            // Use direct URL first, fallback to CORS proxy
            const directUrl = config.baseUrl + '/chat/completions';
            const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(directUrl);
            
            // Try direct first
            let lastError = null;
            for (const url of [directUrl, proxyUrl]) {
                try {
                    const resp = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + config.apiKey
                        },
                        body: JSON.stringify(body)
                    });
                    if (!resp.ok) {
                        const errText = await resp.text();
                        // If this is direct URL and failed, try proxy
                        if (url === directUrl) {
                            lastError = new Error('AI API 错误 (' + resp.status + '): ' + errText);
                            continue;
                        }
                        throw new Error('AI API 错误 (' + resp.status + '): ' + errText);
                    }
                    const data = await resp.json();
                    const content = data.choices?.[0]?.message?.content || '';
                    if (content) return content;
                } catch(e) {
                    if (url === directUrl) {
                        lastError = e;
                        console.warn('Direct AI API failed, trying CORS proxy:', e.message);
                        continue;
                    }
                    throw e;
                }
            }
            throw lastError || new Error('AI API 不可用');
        }

        async function aiChatWithJSON(systemPrompt, userMessage, config) {
            const content = await aiChat(systemPrompt, userMessage, config);
            // Try to extract JSON from the response
            const jsonMatch = content.match(/\{[\s\S]*\}/);
            if (jsonMatch) {
                try {
                    return JSON.parse(jsonMatch[0]);
                } catch(e) {
                    console.error('Failed to parse AI response as JSON:', content);
                    throw new Error('AI返回格式异常，请重试');
                }
            }
            throw new Error('AI未返回有效JSON格式');
        }

        // ============================================================
        //  Toast
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const styles = {
                success: 'bg-green-50 border-green-200 text-green-800',
                error: 'bg-red-50 border-red-200 text-red-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800',
                info: 'bg-blue-50 border-blue-200 text-blue-800'
            };
            const emojis = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            toast.className = `flex items-center px-4 py-3 rounded-xl border shadow-soft-lg animate-slide-down ${styles[type]}`;
            toast.innerHTML = `
                <span class="mr-3 flex-shrink-0 text-lg">${emojis[type]}</span>
                <span class="font-medium">${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ============================================================
        //  Loading
        // ============================================================
        function showLoading(text = '加载中...') {
            document.getElementById('loading-text').textContent = text;
            document.getElementById('global-loading').classList.remove('hidden');
            document.getElementById('global-loading').classList.add('flex');
        }
        function hideLoading() {
            document.getElementById('global-loading').classList.add('hidden');
            document.getElementById('global-loading').classList.remove('flex');
        }

        // ============================================================
        //  File Upload Helper
        // ============================================================
        async function uploadFile(file, onProgress) {
            const formData = new FormData();
            formData.append('file', file);
            const token = localStorage.getItem('baas_token') || '';
            const response = await fetch(`${CONFIG.baseUrl}/common/upload`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'CODE_FLYING': CONFIG.apiKey
                },
                body: formData
            });
            const result = await response.json();
            if (result.success && result.data) {
                return result.data.url;
            }
            throw new Error(result.message || '上传失败');
        }

        // ============================================================
        //  Status Badge
        // ============================================================
        function statusBadge(status) {
            const map = {
                'pending': { label: '待审核', cls: 'bg-gray-100 text-gray-600 border-gray-200' },
                'reviewing': { label: '审核中', cls: 'bg-blue-50 text-blue-600 border-blue-200 animate-pulse-soft' },
                'ai_done': { label: 'AI完成', cls: 'bg-amber-50 text-amber-600 border-amber-200' },
                'completed': { label: '已完成', cls: 'bg-green-50 text-green-700 border-green-200' },
            };
            const s = map[status] || { label: status, cls: 'bg-gray-100 text-gray-500' };
            return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${s.cls}">${s.label}</span>`;
        }

        function sceneStatusBadge(status) {
            const map = {
                'pass': { label: '通过', cls: 'bg-green-100 text-green-700 border-green-200' },
                'warning': { label: '警告', cls: 'bg-amber-100 text-amber-700 border-amber-200' },
                'fail': { label: '不通过', cls: 'bg-red-100 text-red-700 border-red-200' },
            };
            const s = map[status] || { label: status, cls: 'bg-gray-100 text-gray-500' };
            return `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${s.cls}">${s.label}</span>`;
        }

        // ============================================================
        //  Score Ring
        // ============================================================
        function scoreRing(score, size = 48) {
            const r = (size / 2) - 4;
            const circumference = 2 * Math.PI * r;
            const offset = circumference - ((score || 0) / 100) * circumference;
            const color = score >= 80 ? '#22c55e' : score >= 60 ? '#f59e0b' : '#ef4444';
            return `
                <svg width="${size}" height="${size}" class="transform -rotate-90 flex-shrink-0">
                    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="3"/>
                    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
                        stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                        stroke-linecap="round" class="transition-all duration-1000"/>
                </svg>
                <span class="absolute inset-0 flex items-center justify-center text-xs font-bold" style="color:${color}">${score || '-'}</span>
            `;
        }

        // ============================================================
        //  Router
        // ============================================================
        function navigate(path) {
            window.location.hash = path;
            render();
        }

        function getRoute() {
            const hash = window.location.hash.slice(1) || '/';
            const parts = hash.split('/').filter(Boolean);
            return { route: '/' + (parts[0] || ''), params: parts };
        }

        const AI_SYSTEM_PROMPT = `你是AI视频审片专家。请分析以下剧本场景的成片质量。

分析维度：
1. **画面与剧本一致性（0-100分）** — 判断这段视频的画面是否准确呈现了剧本描述
2. **画面质量问题** — 画面模糊、穿帮、构图问题、灯光问题等
3. **音画同步（0-100分）** — 口型是否对得上，声音是否匹配画面
4. **字幕检查** — ①错别字 ②字幕是否与台词一致
5. **AI总评** — 这段场景做得好的和不好的

输出JSON格式：
{
  "scene_index": 1,
  "script_text": "（直接从剧本摘录的该场景原文）",
  "consistency_score": 85,
  "quality_issues": ["画面左侧有穿帮道具", "角色服装颜色与剧本不一致"],
  "audio_sync_score": 78,
  "audio_sync_issues": "第15秒处口型与对白不同步",
  "subtitle_text": "（提取的字幕文本，如果有）",
  "subtitle_typo_count": 2,
  "subtitle_typo_issues": ["把'彷徨'打成了'徘徊'"],
  "subtitle_consistency_score": 92,
  "subtitle_consistency_issues": ["字幕第3句与台词略有差异"],
  "ai_comment": "整体表现不错，...",
  "status": "pass"
}

注意：status 只能是 "pass"、"warning"、"fail" 之一。如果分数都≥70且无明显问题则为 pass，有少数问题为 warning，严重问题为 fail。`;

        async function startReview(projectId) {
            const cfg = getApiConfig();
            if (!cfg.apiKey) {
                showToast('请先在右上角 ⚙ 设置中配置 API Key', 'warning');
                openApiConfig();
                return;
            }

            if (!confirm('确认启动 AI 审片？系统将分析剧本与成片视频进行逐帧审核，并实时更新结果。')) return;

            // Clear existing scenes if re-starting
            const existingScenes = await client.db.from('scenes').list().eq('project_id', projectId);
            if (existingScenes.success && existingScenes.data) {
                for (const s of existingScenes.data) {
                    await client.db.from('scenes').delete().eq('id', s.id);
                }
            }

            // Set status to reviewing
            await client.db.from('projects').update()
                .set({ status: 'reviewing', updated_at: new Date().toISOString().slice(0,19).replace('T', ' ') })
                .eq('id', projectId);

            navigate(`/project/${projectId}`);

            // Start review in background
            setTimeout(() => runAiReview(projectId), 500);
        }

        async function runAiReview(projectId) {
            const cfg = getApiConfig();
            if (!cfg.apiKey) return;

            try {
                // Get project details
                const projRes = await client.db.from('projects').get().eq('id', projectId);
                if (!projRes.success || !projRes.data) {
                    showToast('项目数据获取失败', 'error');
                    await client.db.from('projects').update()
                        .set({ status: 'pending' }).eq('id', projectId);
                    return;
                }
                const project = projRes.data;

                // Get script text
                let scriptText = '';
                // Try stored text first (from 'reviewer_notes' - uploaded during project creation)
                if (project.reviewer_notes && project.reviewer_notes.trim().length > 5) {
                    scriptText = project.reviewer_notes;
                }
                if (!scriptText && project.script_file && project.script_file.length > 0) {
                    for (const entry of project.script_file) {
                        try {
                            const fileUrl = typeof entry === 'string' ? entry : (entry.url || entry);
                            scriptText = await fetchTextFromUrl(fileUrl);
                            if (scriptText) break;
                        } catch(e) {
                            console.warn('Failed to fetch script:', url, e);
                        }
                    }
                }

                if (!scriptText || scriptText.trim().length < 5) {
                    showToast('无法读取剧本内容，请确认剧本文件格式正确', 'error');
                    await client.db.from('projects').update()
                        .set({ status: 'pending' }).eq('id', projectId);
                    return;
                }

                // Split into scenes
                const sceneBlocks = splitIntoScenes(scriptText);
                const totalScenes = sceneBlocks.length;

                // Update project with total scenes count
                await client.db.from('projects').update()
                    .set({
                        total_scenes: totalScenes,
                        status: 'reviewing',
                        updated_at: new Date().toISOString().slice(0,19).replace('T', ' ')
                    }).eq('id', projectId);

                let passCount = 0, warningCount = 0, failCount = 0;
                let totalScore = 0;

                // Process each scene
                for (let i = 0; i < totalScenes; i++) {
                    // Update UI for current scene being analyzed
                    updateReviewProgress(projectId, i, totalScenes, sceneBlocks[i], 'analyzing');

                    const userMessage = `请分析以下剧本场景（第${i+1}场/${totalScenes}场）：\n\n${sceneBlocks[i]}`;

                    try {
                        const result = await aiChatWithJSON(AI_SYSTEM_PROMPT, userMessage, cfg);

                        // Validate result
                        const sceneIndex = result.scene_index || (i + 1);
                        const status = result.status || 'warning';
                        const consistencyScore = result.consistency_score != null ? result.consistency_score : 60;
                        const audioSyncScore = result.audio_sync_score != null ? result.audio_sync_score : 60;
                        const subtitleConsistencyScore = result.subtitle_consistency_score != null ? result.subtitle_consistency_score : 60;

                        // Save scene to database
                        const sceneData = {
                            project_id: projectId,
                            scene_index: sceneIndex,
                            script_text: result.script_text || sceneBlocks[i].substring(0, 500),
                            consistency_score: consistencyScore,
                            quality_issues: JSON.stringify(result.quality_issues || []),
                            audio_sync_score: audioSyncScore,
                            audio_sync_issues: result.audio_sync_issues || '',
                            subtitle_text: result.subtitle_text || '',
                            subtitle_typo_count: result.subtitle_typo_count || 0,
                            subtitle_typo_issues: JSON.stringify(result.subtitle_typo_issues || []),
                            subtitle_consistency_score: subtitleConsistencyScore,
                            subtitle_consistency_issues: JSON.stringify(result.subtitle_consistency_issues || []),
                            ai_comment: result.ai_comment || '',
                            status: status,
                            created_at: new Date().toISOString().slice(0,19).replace('T', ' ')
                        };

                        const saveRes = await client.db.from('scenes').insert().values(sceneData);
                        if (!saveRes.success) {
                            console.error('Failed to save scene:', saveRes);
                        }

                        // Update counts
                        if (status === 'pass') passCount++;
                        else if (status === 'warning') warningCount++;
                        else failCount++;
                        totalScore += consistencyScore;

                        // Update UI
                        updateReviewProgress(projectId, i + 1, totalScenes, sceneBlocks[i], 'done');

                    } catch (err) {
                        console.error(`Scene ${i+1} analysis failed:`, err);
                        showToast(`场景 ${i+1} 分析失败: ${err.message}`, 'error');
                        // Save a failed placeholder
                        const fallbackData = {
                            project_id: projectId,
                            scene_index: i + 1,
                            script_text: sceneBlocks[i].substring(0, 200),
                            consistency_score: 0,
                            quality_issues: JSON.stringify([]),
                            audio_sync_score: 0,
                            subtitle_consistency_score: 0,
                            ai_comment: `分析失败: ${err.message}`,
                            status: 'warning',
                            created_at: new Date().toISOString().slice(0,19).replace('T', ' ')
                        };
                        await client.db.from('scenes').insert().values(fallbackData);
                        failCount++;
                        updateReviewProgress(projectId, i + 1, totalScenes, sceneBlocks[i], 'done');
                    }
                }

                // All scenes done - generate summary report
                const overallScore = totalScenes > 0 ? Math.round(totalScore / totalScenes) : 0;

                try {
                    const summaryPrompt = `你是一个专业的视频审片总结专家。请基于以下审片结果生成总体评价。

共分析 ${totalScenes} 个场景。
通过：${passCount} 个
警告：${warningCount} 个
不通过：${failCount} 个
综合评分：${overallScore}

请输出JSON格式：
{
  "overall": "（200字内的总体评价）",
  "mainIssues": ["主要问题1", "主要问题2", "主要问题3"],
  "highlights": ["亮点1", "亮点2"]
}`;
                    const summaryResult = await aiChatWithJSON(summaryPrompt, '请生成审片总结报告', cfg);

                    await client.db.from('projects').update()
                        .set({
                            status: 'ai_done',
                            overall_score: overallScore,
                            pass_count: passCount,
                            warning_count: warningCount,
                            fail_count: failCount,
                            summary_report: JSON.stringify(summaryResult),
                            updated_at: new Date().toISOString().slice(0,19).replace('T', ' ')
                        }).eq('id', projectId);

                } catch (err) {
                    console.error('Summary generation failed:', err);
                    // Still mark as done
                    await client.db.from('projects').update()
                        .set({
                            status: 'ai_done',
                            overall_score: overallScore,
                            pass_count: passCount,
                            warning_count: warningCount,
                            fail_count: failCount,
                            updated_at: new Date().toISOString().slice(0,19).replace('T', ' ')
                        }).eq('id', projectId);
                }

                showToast('AI 审片完成！', 'success');
                // Refresh display
                navigate(`/project/${projectId}`);

            } catch (err) {
                console.error('AI Review failed:', err);
                showToast('审片过程出错: ' + err.message, 'error');
                await client.db.from('projects').update()
                    .set({ status: 'ai_done' }).eq('id', projectId);
                navigate(`/project/${projectId}`);
            }
        }

        // ============================================================
        //  Review Progress UI (real-time updates)
        // ============================================================
        function updateReviewProgress(projectId, doneCount, totalCount, currentScriptText, state) {
            // Update the progress bar if it exists
            const progressBar = document.getElementById('review-progress-bar');
            const progressText = document.getElementById('review-progress-text');
            const percentEl = document.getElementById('review-progress-percent');

            if (progressBar) {
                const pct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;
                progressBar.style.width = `${pct}%`;
                if (percentEl) percentEl.textContent = `${pct}%`;
                if (progressText) {
                    if (state === 'analyzing') {
                        progressText.textContent = `正在分析第 ${doneCount + 1}/${totalCount} 场...`;
                        progressBar.className = 'progress-bar h-full rounded-full bg-gradient-to-r from-blue-500 to-blue-400';
                    } else if (state === 'done') {
                        progressText.textContent = `已完成 ${doneCount}/${totalCount} 场`;
                        progressBar.className = 'progress-bar h-full rounded-full bg-gradient-to-r from-green-500 to-green-400';
                    }
                }
            }

            // Refresh scene list periodically by re-rendering
            if (state === 'analyzing' || state === 'done') {
                // We'll use a polling approach: re-render every few seconds
                // But to avoid loops, we just update specific elements
                refreshSceneCards(projectId);
            }
        }

        // ============================================================
        //  Poll for new scenes and update cards
        // ============================================================
        let sceneRefreshTimer = null;

        async function refreshSceneCards(projectId) {
            const container = document.getElementById('scene-cards-container');
            if (!container) return;

            try {
                const scenesRes = await client.db.from('scenes').list()
                    .eq('project_id', projectId)
                    .order('scene_index', 'asc');
                const scenes = scenesRes.success ? (scenesRes.data || []) : [];

                // Build cards HTML
                let html = scenes.map(s => buildSceneCardHtml(s)).join('');

                // Add pending placeholders for not-yet-analyzed scenes
                const projRes = await client.db.from('projects').get().eq('id', projectId);
                const totalScenes = projRes.success && projRes.data ? (projRes.data.total_scenes || scenes.length) : scenes.length;

                if (scenes.length < totalScenes) {
                    for (let i = scenes.length + 1; i <= totalScenes; i++) {
                        html += `
                        <div class="bg-white rounded-2xl shadow-soft p-5 border border-gray-100 review-scene-card pending visible" data-scene-index="${i}">
                            <div class="flex items-center space-x-3 mb-3">
                                <span class="w-7 h-7 rounded-lg bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-400">${i}</span>
                                <h3 class="text-sm font-semibold text-gray-900">场景 ${i}</h3>
                                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400 border border-gray-200">待分析</span>
                            </div>
                            <div class="flex items-center space-x-2 text-sm text-gray-400">
                                <div class="w-4 h-4 border-2 border-gray-200 border-t-gray-400 rounded-full animate-spin"></div>
                                <span>⏳ 等待AI审片...</span>
                            </div>
                        </div>`;
                    }
                }

                container.innerHTML = html;
            } catch(e) {
                // Silently fail on refresh
            }
        }

        function buildSceneCardHtml(s) {
            const statusLabel = s.status === 'pass' ? '通过' : s.status === 'warning' ? '警告' : '不通过';
            const statusCls = s.status === 'pass' ? 'bg-green-100 text-green-700 border-green-200' :
                              s.status === 'warning' ? 'bg-amber-100 text-amber-700 border-amber-200' :
                              'bg-red-100 text-red-700 border-red-200';
            const issues = safeJsonParse(s.quality_issues, []);
            const typoIssues = safeJsonParse(s.subtitle_typo_issues, []);
            const subConsistencyIssues = safeJsonParse(s.subtitle_consistency_issues, []);

            return `
            <div class="bg-white rounded-2xl shadow-soft p-5 border border-gray-100 hover-lift review-scene-card done visible" data-scene-id="${s.id}">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex items-center space-x-3">
                        <span class="w-7 h-7 rounded-lg bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-500">${s.scene_index}</span>
                        <h3 class="text-sm font-semibold text-gray-900">场景 ${s.scene_index}</h3>
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium border ${statusCls}">${statusLabel}</span>
                    </div>
                    ${s.consistency_score != null ? `
                    <div class="relative flex-shrink-0">${scoreRing(s.consistency_score, 40)}</div>
                    ` : ''}
                </div>
                ${s.script_text ? `<p class="text-xs text-gray-500 mb-2 line-clamp-2">剧本：${s.script_text}</p>` : ''}
                ${s.audio_sync_score != null ? `
                <div class="flex items-center space-x-2 mb-2">
                    <span class="text-xs text-gray-400">音画同步：</span>
                    <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium ${s.audio_sync_score >= 80 ? 'bg-green-50 text-green-600' : s.audio_sync_score >= 60 ? 'bg-amber-50 text-amber-600' : 'bg-red-50 text-red-600'}">${s.audio_sync_score}分</span>
                    ${s.audio_sync_issues ? `<span class="text-xs text-red-400 truncate max-w-[200px]">${s.audio_sync_issues}</span>` : ''}
                </div>` : ''}
                <div class="flex flex-wrap items-center gap-2 mb-2">
                    ${s.subtitle_typo_count != null && s.subtitle_typo_count > 0 ? `
                    <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-red-50 text-red-600">
                        错别字 ${s.subtitle_typo_count}处
                    </span>` : s.subtitle_typo_count === 0 ? `
                    <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium bg-green-50 text-green-600">
                        字幕无错别字
                    </span>` : ''}
                    ${s.subtitle_consistency_score != null ? `
                    <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium ${s.subtitle_consistency_score >= 80 ? 'bg-green-50 text-green-600' : s.subtitle_consistency_score >= 60 ? 'bg-amber-50 text-amber-600' : 'bg-red-50 text-red-600'}">
                        字幕剧本一致 ${s.subtitle_consistency_score}分
                    </span>` : ''}
                </div>
                ${issues.length ? `
                <div class="mt-2 flex flex-wrap gap-1.5">
                    ${issues.map(i => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-red-50 text-red-600 border border-red-100">${i}</span>`).join('')}
                </div>` : ''}
                ${s.ai_comment ? `<p class="text-xs text-gray-400 bg-gray-50 rounded-lg p-2 mt-2">💬 ${s.ai_comment}</p>` : ''}
            </div>`;
        }

        // ============================================================
        //  Page: Project Detail
        // ============================================================
        async function renderProjectDetail(container, projectId) {
            showLoading('加载审片详情...');
            const res = await client.db.from('projects').get().eq('id', parseInt(projectId));
            hideLoading();
            if (!res.success || !res.data) {
                container.innerHTML = `<div class="text-center py-20 text-gray-500">项目不存在</div>`;
                return;
            }
            const project = res.data;
            const scenesRes = await client.db.from('scenes').list()
                .eq('project_id', project.id)
                .order('scene_index', 'asc');
            const scenes = scenesRes.success ? (scenesRes.data || []) : [];
            const report = project.summary_report ? safeJsonParse(project.summary_report, {}) : {};
            const totalScenes = project.total_scenes || Math.max(scenes.length, 1);
            const doneCount = scenes.length;
            const isReviewing = project.status === 'reviewing';

            container.innerHTML = `
            <div class="mb-6 animate-fade-in">
                <button onclick="navigate('/')" class="inline-flex items-center text-sm text-gray-400 hover:text-blue-600 transition-smooth">
                    <span class="mr-1 text-sm">‹</span>
                    返回列表
                </button>
            </div>
            <div class="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 animate-slide-up mb-6">
                <div class="flex items-start justify-between flex-wrap gap-4">
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center space-x-3 mb-2">
                            <h1 class="text-xl sm:text-2xl font-bold text-gray-900">${project.project_name || '未命名项目'}</h1>
                            ${statusBadge(project.status)}
                        </div>
                        <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500">
                            ${project.created_at ? `<span>创建于 ${new Date(project.created_at).toLocaleString('zh-CN')}</span>` : ''}
                            ${totalScenes ? `<span>共 ${totalScenes} 场</span>` : ''}
                            ${project.pass_count != null ? `<span class="text-green-500">✓ ${project.pass_count} 通过</span>` : ''}
                            ${project.warning_count ? `<span class="text-amber-500">⚠ ${project.warning_count} 警告</span>` : ''}
                            ${project.fail_count ? `<span class="text-red-500">✗ ${project.fail_count} 不通过</span>` : ''}
                        </div>
                    </div>
                    ${project.overall_score != null ? `
                    <div class="flex items-center space-x-3">
                        <div class="text-right">
                            <p class="text-xs text-gray-400">综合评分</p>
                            <p class="text-2xl font-bold ${project.overall_score >= 80 ? 'text-green-500' : project.overall_score >= 60 ? 'text-amber-500' : 'text-red-500'}">${project.overall_score}</p>
                        </div>
                    </div>
                    ` : ''}
                </div>

                <!-- Progress Bar (shown during review) -->
                ${isReviewing ? `
                <div class="mt-4 pt-4 border-t border-gray-100">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-gray-500" id="review-progress-text">${doneCount > 0 ? `已完成 ${doneCount}/${totalScenes} 场` : '准备分析...'}</span>
                        <span class="text-sm font-semibold text-blue-600" id="review-progress-percent">${totalScenes > 0 ? Math.round((doneCount/totalScenes)*100) : 0}%</span>
                    </div>
                    <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div id="review-progress-bar" class="progress-bar h-full rounded-full bg-gradient-to-r from-blue-500 to-blue-400" style="width: ${totalScenes > 0 ? Math.round((doneCount/totalScenes)*100) : 0}%"></div>
                    </div>
                </div>
                ` : ''}

                <!-- Action Buttons -->
                <div class="mt-4 pt-4 border-t border-gray-100 flex flex-wrap gap-2">
                    ${project.status === 'pending' || project.status === 'reviewing' ? `
                    <button onclick="startReview(${project.id})" class="bg-amber-500 text-white" style="color:#ffffff!important;" px-4 py-2 rounded-xl text-sm font-medium hover-lift shadow-soft flex items-center space-x-1.5">
                        <span class="text-base">▶</span>
                        <span>${project.status === 'reviewing' ? '重新开始AI审片' : '启动AI审片'}</span>
                    </button>
                    ` : ''}
                    ${project.status === 'ai_done' ? `
                    <button onclick="completeReview(${project.id})" class="bg-green-500 text-white" style="color:#ffffff!important;" px-4 py-2 rounded-xl text-sm font-medium hover-lift shadow-soft flex items-center space-x-1.5">
                        <span class="text-base">✓</span>
                        <span>标记已完成</span>
                    </button>
                    ` : ''}
                    <button onclick="deleteProject(${project.id})" class="px-4 py-2 rounded-xl text-sm font-medium text-red-400 hover:text-red-600 hover:bg-red-50 transition-smooth flex items-center space-x-1.5">
                        <span class="text-base">✕</span>
                        <span>删除</span>
                    </button>
                </div>
            </div>
            <div class="mb-6 animate-fade-in" id="scene-cards-container">
                <h2 class="text-base font-semibold text-gray-900 mb-4 flex items-center">
                    <span class="mr-2 text-gray-400 text-base">🎬</span>
                    场景逐帧审核 ${scenes.length ? `（${scenes.length}/${totalScenes} 场）` : `（共 ${totalScenes} 场）`}
                </h2>
                <div class="space-y-4">
                    ${scenes.map(s => buildSceneCardHtml(s)).join('')}
                    ${scenes.length < totalScenes ? Array.from({length: totalScenes - scenes.length}, (_, i) => {
                        const idx = scenes.length + i + 1;
                        return `
                        <div class="bg-white rounded-2xl shadow-soft p-5 border border-gray-100 review-scene-card pending visible" data-scene-index="${idx}">
                            <div class="flex items-center space-x-3 mb-3">
                                <span class="w-7 h-7 rounded-lg bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-400">${idx}</span>
                                <h3 class="text-sm font-semibold text-gray-900">场景 ${idx}</h3>
                                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-400 border border-gray-200">待分析</span>
                            </div>
                            <div class="flex items-center space-x-2 text-sm text-gray-400">
                                <div class="w-4 h-4 border-2 border-gray-200 border-t-gray-400 rounded-full animate-spin"></div>
                                <span>⏳ 等待AI审片...</span>
                            </div>
                        </div>`;
                    }).join('') : ''}
                </div>
            </div>
            ${report.overall || report.mainIssues || report.highlights ? `
            <div class="bg-white rounded-2xl shadow-soft p-6 border border-gray-100 mb-6 animate-slide-up">
                <h2 class="text-base font-semibold text-gray-900 mb-4 flex items-center">
                    <span class="mr-2 text-blue-500 text-base">✓</span>
                    AI审片报告
                </h2>
                ${report.overall ? `
                <div class="mb-4">
                    <p class="text-sm font-medium text-gray-600 mb-1">总体评价</p>
                    <p class="text-sm text-gray-700 bg-gray-50 rounded-xl p-3">${report.overall}</p>
                </div>` : ''}
                ${report.mainIssues && report.mainIssues.length ? `
                <div class="mb-4">
                    <p class="text-sm font-medium text-gray-600 mb-2">主要问题</p>
                    <ul class="space-y-1.5">
                        ${report.mainIssues.map(i => `<li class="flex items-start space-x-2 text-sm text-gray-600">
                            <span class="text-red-400 mt-0.5 flex-shrink-0">•</span>
                            <span>${i}</span>
                        </li>`).join('')}
                    </ul>
                </div>` : ''}
                ${report.highlights && report.highlights.length ? `
                <div>
                    <p class="text-sm font-medium text-gray-600 mb-2">亮点</p>
                    <ul class="space-y-1.5">
                        ${report.highlights.map(i => `<li class="flex items-start space-x-2 text-sm text-gray-600">
                            <span class="text-green-400 mt-0.5 flex-shrink-0">•</span>
                            <span>${i}</span>
                        </li>`).join('')}
                    </ul>
                </div>` : ''}
            </div>` : ''}
            `;

            // Start polling for scene updates if reviewing
            if (isReviewing && sceneRefreshTimer === null) {
                sceneRefreshTimer = setInterval(() => {
                    refreshSceneCards(projectId);
                }, 3000);
            }
        }

        // ============================================================
        //  Actions
        // ============================================================
        function safeJsonParse(str, fallback) {
            try { return JSON.parse(str); } catch { return fallback; }
        }

        async function completeReview(projectId) {
            if (!confirm('确认标记为已完成？')) return;
            try {
                await client.db.from('projects').update()
                    .set({ status: 'completed', updated_at: new Date().toISOString().slice(0,19).replace('T', ' ') })
                    .eq('id', projectId);
                if (sceneRefreshTimer) {
                    clearInterval(sceneRefreshTimer);
                    sceneRefreshTimer = null;
                }
                showToast('已标记为完成', 'success');
                navigate(`/project/${projectId}`);
            } catch (err) {
                showToast(err.message || '操作失败', 'error');
            }
        }

        async function deleteProject(projectId) {
            if (!confirm('确认删除该项目及其所有场景数据？此操作不可恢复。')) return;
            try {
                // Delete all associated scenes first
                const scenes = await client.db.from('scenes').list().eq('project_id', projectId);
                if (scenes.success && scenes.data) {
                    for (const s of scenes.data) {
                        await client.db.from('scenes').delete().eq('id', s.id);
                    }
                }
                await client.db.from('projects').delete().eq('id', projectId);
                if (sceneRefreshTimer) {
                    clearInterval(sceneRefreshTimer);
                    sceneRefreshTimer = null;
                }
                showToast('已删除项目及所有场景', 'success');
                navigate('/');
            } catch (err) {
                showToast(err.message || '删除失败', 'error');
            }
        }

        function openSceneDetail(projectId, sceneId) {
            const cards = document.querySelectorAll('.bg-white.rounded-2xl.shadow-soft');
            for (const card of cards) {
                if (card.textContent.includes(`场景 ${sceneId}`) || card.querySelector('[data-scene-id]')) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.style.boxShadow = '0 0 0 2px #3b82f6';
                    setTimeout(() => card.style.boxShadow = '', 2000);
                    return;
                }
            }
        }

        // ============================================================
        //  Page Detail: Re-render support
        // ============================================================
        window.navigate = navigate;
        window.startReview = startReview;
        window.completeReview = completeReview;
        window.deleteProject = deleteProject;
        window.openSceneDetail = openSceneDetail;
        window.openApiConfig = openApiConfig;
        window.closeApiConfig = closeApiConfig;
        window.saveApiConfig = saveApiConfig;

        // ============================================================
        //  Init
        // ============================================================
        // PC: Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'n') { e.preventDefault(); navigate('/new'); }
            if (e.key === 'Escape') {
                const modal = document.getElementById('api-config-modal');
                if (modal && !modal.classList.contains('hidden')) closeApiConfig();
            }
        });
        
        // PC: File drag-and-drop on textarea
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('script-text');
            if (!textarea) return;
            textarea.addEventListener('dragover', (e) => { e.preventDefault(); textarea.classList.add('border-blue-400'); });
            textarea.addEventListener('dragleave', () => textarea.classList.remove('border-blue-400'));
            textarea.addEventListener('drop', async (e) => {
                e.preventDefault();
                textarea.classList.remove('border-blue-400');
                const files = e.dataTransfer.files;
                if (!files.length) return;
                const file = files[0];
                if (!file.name.match(/\.(docx|txt|md)$/i)) return;
                try {
                    const fr = new FileReader();
                    const text = await new Promise((resolve, reject) => {
                        fr.onload = () => resolve(fr.result);
                        fr.onerror = reject;
                        if (file.name.endsWith('.docx') && typeof mammoth !== 'undefined') {
                            fr.readAsArrayBuffer(file);
                        } else {
                            fr.readAsText(file);
                        }
                    });
                    if (file.name.endsWith('.docx') && typeof mammoth !== 'undefined') {
                        const result = await mammoth.extractRawText({ arrayBuffer: text });
                        textarea.value = result.value;
                    } else {
                        textarea.value = text;
                    }
                    showToast('剧本内容已读取', 'success');
                } catch(e) {
                    showToast('读取文件失败: ' + e.message, 'error');
                }
            });
        });
        
        // Auto-refresh projects with reviewing status every 10s
        let reviewAutoRefreshTimer = null;
        function startReviewAutoRefresh() {
            if (reviewAutoRefreshTimer) clearInterval(reviewAutoRefreshTimer);
            reviewAutoRefreshTimer = setInterval(() => {
                const listEl = document.getElementById('project-list');
                if (listEl || window.location.hash.startsWith('#/project/')) {
                    render();
                } else {
                    clearInterval(reviewAutoRefreshTimer);
                    reviewAutoRefreshTimer = null;
                }
            }, 10000);
        }
        
        window.addEventListener('hashchange', () => {
            if (sceneRefreshTimer) {
                clearInterval(sceneRefreshTimer);
                sceneRefreshTimer = null;
            }
            if (window.location.hash.startsWith('#/project/')) {
                startReviewAutoRefresh();
            } else if (reviewAutoRefreshTimer) {
                clearInterval(reviewAutoRefreshTimer);
                reviewAutoRefreshTimer = null;
            }
            render();
        });
        window.addEventListener('DOMContentLoaded', render);
        render();
    </script>
    <div class="fixed bottom-2 right-2 text-[10px] text-gray-300 opacity-50 select-none">v2.1</div>
</body>
</html>
